# ospex-mm.example.yaml — annotated reference config (v0)
#
# Copy this to ospex-mm.yaml, fill in wallet / rpcUrl / pricing / risk, and run.
# Defaults are conservative and dry-run. Going live requires BOTH mode.dryRun:
# false here AND the --live flag on the command (the two-key model — see
# docs/DESIGN.md §8 and docs/OPERATOR_SAFETY.md). The full schema and the
# rationale for every field are in docs/DESIGN.md §7.

wallet:
  keystorePath: ~/.foundry/keystores/ospex-mm   # Foundry v3 keystore; prompts for passphrase on sign.
                                                 # (Or set OSPEX_KEYSTORE_PATH instead.)

rpcUrl: ""            # REQUIRED. Alchemy / Infura / QuickNode URL for the chain. No public-RPC default.
apiUrl: ""            # Optional. Defaults to the production Ospex core API URL.
chainId: 137          # 137 = Polygon mainnet, 80002 = Amoy testnet.

marketSelection:
  sports: ["mlb"]                  # any of: mlb, nba, nhl, ncaab, ncaaf, nfl (config-driven; add more freely)
  markets: ["moneyline"]           # v0 supports only "moneyline"; "spread"/"total" are REJECTED by config validation.
  maxStartsWithinHours: 24         # only quote games starting within this window
  maxTrackedContests: 5            # hard cap on contests tracked at once. Each tracked contest opens one live odds stream
                                   #   (moneyline-only in v0), so this also bounds SSE connections — see odds.maxRealtimeChannels.
  requireReferenceOdds: true       # skip games with no upstream odds linkage
  requireOpenSpeculation: true     # v0: only quote markets whose speculation already exists (no lazy creation)
  contestAllowList: []             # optional: if non-empty, ONLY these contestIds
  contestDenyList: []              # optional: never these contestIds

discovery:
  everyNTicks: 10                  # run discovery every N ticks (10 * 30s = ~5 min)
  jitterPct: 0.2                   # +/- jitter on the discovery interval

odds:
  subscribe: true                  # subscription-first: stream reference-odds changes over core-api SSE. Strongly preferred.
                                   #   false = degraded fallback to bounded snapshot polling (restricted nets only).
  maxRealtimeChannels: 5           # hard cap on open odds-stream connections (~ maxTrackedContests * markets; moneyline-only in v0).
                                   #   core-api enforces a per-IP cap (default 10, MAX_STREAM_CONNECTIONS_PER_IP) shared across ALL
                                   #   streams from one host — keep this (plus ~3 reserved for own-state streams) under it, or raise
                                   #   the server cap. The runner warns at boot if the budget would be exceeded.

ownState:
  subscribe: false                 # Phase 2 PR4a — opt-in to the owner-authenticated own-state SSE stream. Default false until
                                   #   the PR5 comparator is wired + soak-validated. `true` requires `mode.dryRun: false` AND a
                                   #   `wallet.keystorePath` (the SDK mints a bearer token signed by the maker's key).
                                   #   Phase 2 invariant: shadow-only — never alters canonical trading state or quote timing.
  debounceMs: 500                  # Phase 2 PR3 — coalescing window (250-1000ms) after a wake fires before the runner drains the
                                   #   shadow queue. SSE bursts of N events within this window collapse to a single drain pass.
                                   #   Phase 2 ships shadow-only — no canonical-state writes, no trading-timing changes.

pricing:
  mode: economics                  # "economics" (derive spread from your return target) or "direct"
  economics:
    capitalUSDC: "50"
    targetMonthlyReturnPct: 0.005   # 0.5% / month on capital
    daysHorizon: 30
    estGamesPerDay: 8.0             # rough count across your configured sports
    fillRateAssumption: 0.30        # FLAGGED ASSUMPTION — replace with measured data later
    capitalTurnoverPerDay: 1.0      # FLAGGED ASSUMPTION
    maxReasonableSpread: 0.05       # refuse to start if the math wants a wider spread than this
  direct:
    spreadBps: 300                  # only used when mode: direct (3.00%)
  quoteBothSides: true
  minEdgeBps: 0                     # require at least this much edge vs fair to bother quoting
  maxPerQuotePctOfCapital: 0.05     # FLAGGED ASSUMPTION — per-quote concentration cap

risk:                               # caps bind WORST-CASE USDC LOSS BY OUTCOME over positions + visible + LATENT quotes
  bankrollUSDC: "50"
  maxBankrollUtilizationPct: 0.50
  maxRiskPerCommitmentUSDC: "0.25"
  maxRiskPerContestUSDC: "1"
  maxRiskPerTeamUSDC: "2"
  maxRiskPerSportUSDC: "5"
  maxOpenCommitments: 10            # counts visible + soft-cancelled-not-yet-expired commitments
  maxDailyFeeUSDC: "0"              # genuinely zero in v0 (no lazy speculation creation)

gas:
  maxDailyGasPOL: "1"               # daily gas budget, in POL (the native token — what's actually spent)
  emergencyReservePOL: "0.2"        # held back for on-chain risk-reduction / capital-recovery after the budget is hit
  reportInUSDC: true                # also report gas in USDC in the run summary (best-effort)
  nativeTokenUSDCPrice: "0.25"      # operator-provided POL->USDC for reporting (no on-chain oracle yet)

approvals:
  autoApprove: false                # the MM will NOT approve USDC on its own unless this is true
  mode: exact                       # "exact" = raise PositionModule allowance to min(risk-cap ceiling, current wallet USDC) — see DESIGN §6.
                                    #   Deferred while the boot-time state-loss hold is active (§12); raise-only.
                                    #   "unlimited" = MaxUint256 (requires --yes; skips the wallet bound). Discouraged.

orders:
  expiryMode: fixed-seconds         # RECOMMENDED. "fixed-seconds" = short expiry, MM rolls quotes forward.
                                    #   "match-time" (expire at game start) is available but DANGEROUS with off-chain
                                    #   cancel — a pulled quote stays matchable for hours. See DESIGN §6.
  expirySeconds: 120                # used when expiryMode: fixed-seconds. Short bounds latent exposure; tunable.
  expiryReleaseGraceSeconds: 60     # hold accounting headroom this many seconds past local expiry before releasing /
                                    #   terminalizing a commitment. The chain keeps it matchable until block.timestamp >=
                                    #   expiry, and the host / core-api clock can lead the chain clock — so freeing (and
                                    #   reposting over) the side exactly at local expiry can briefly double exposure. Book
                                    #   hygiene still treats the quote as expired at expiry; only headroom release waits. 0 = off.
  staleAfterSeconds: 90             # pull-and-repost a quote this old (< expirySeconds, so it never just lapses)
  staleReferenceAfterSeconds: 300   # treat reference odds as stale (pull quotes, don't repost) if nothing heard this long
  replaceOnOddsMoveBps: 50          # pull-and-repost when fair value moves more than this since posting
  cancelMode: offchain              # how to free a partially-filled remainder that's stale/mispriced/unwanted:
                                    #   "offchain" (default) — leave it; its off-chain cancel is rejected once matched (409),
                                    #     so it rides to expiry. Fine under short fixed-seconds expiry. (visibleOpen quotes are
                                    #     always pulled gasless off-chain regardless of this setting.)
                                    #   "onchain" — authoritatively cancelCommitment the remainder on chain (costs POL gas,
                                    #     gas-gated WITHOUT the emergency reserve), then re-quote the freed side. Use this for
                                    #     long-lived / match-time quotes where a remainder would otherwise block the side for hours.

fundingGuard:                       # solvency guard (DESIGN §6): halt NEW posting when the wallet can no longer back its
                                    #   outstanding fill obligations. funding = min(wallet USDC, PositionModule allowance);
                                    #   required = GROSS remaining maker risk over open + partial + soft-cancelled-unexpired
                                    #   commitments (NOT outcome-netted; filled positions excluded — their USDC was already
                                    #   pulled on chain at fill). Trips when funding < required.
  enabled: true                     # master switch. false = never read funding, never hold.
  checkIntervalMs: 30000            # min interval between on-chain funding re-reads (balance + allowance); funding moves slowly.
  underfundedCancelMode: offchain   # what to do with EXISTING visible quotes when underfunded (active cancel response):
                                    #   "offchain" pull off the relay (gasless) / "onchain" also authoritatively cancel on chain
                                    #   (gas) / "none" hold only (ride to expiry). NEW posting is ALWAYS halted while underfunded,
                                    #   regardless of this setting. Only "onchain" reduces on-chain exposure (required), so it's the
                                    #   only mode under which the hold clears before the commitments expire.
  failClosedOnReadError: true       # a failed balance/allowance read ENTERS the hold (halts new posting) rather than proceeding —
                                    #   never post commitments the MM might not be able to back. Strongly recommended.

settlement:
  autoSettleOwn: true                       # settle the maker's own already-scored speculations (permissionless)
  autoClaimOwn: true                        # claim the maker's own winning positions
  continueOnGasBudgetExhausted: true        # allow settle/claim after the daily gas budget is hit (within the reserve)

telemetry:
  logDir: ./telemetry               # NDJSON event logs land here
  logLevel: info

state:
  dir: ./state                      # persistent inventory / soft-cancelled set / P&L / daily counters (JSON, atomic, single-process)

killSwitchFile: ./KILL
killCancelOnChain: false            # false = soft stop (pulled quotes expire on their own); true = hard stop (gas, uses reserve)

pollIntervalMs: 30000               # enforced floor 30000 (see DESIGN §7); paces discovery + fill detection, not odds

mode:
  dryRun: true                      # MASTER SAFETY FLAG. true = compute everything, post nothing.
                                    #   Live requires dryRun: false AND the --live flag (see DESIGN §8).
